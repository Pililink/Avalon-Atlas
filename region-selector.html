<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Region Selector</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .frozen-shot {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: fill;
        user-select: none;
        pointer-events: none;
      }
      
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.18);
        cursor: crosshair;
      }
      
      .selection-rect {
        position: absolute;
        border: 2px solid #58a6ff;
        background: rgba(88, 166, 255, 0.1);
        pointer-events: none;
      }
      
      .size-label {
        position: absolute;
        bottom: -25px;
        right: 0;
        background: #58a6ff;
        color: #000;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .hint {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-family: system-ui, -apple-system, sans-serif;
        pointer-events: none;
      }

      .load-error {
        position: absolute;
        top: 64px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        max-width: min(720px, calc(100vw - 32px));
        background: rgba(120, 22, 22, 0.92);
        color: #fff;
        padding: 8px 12px;
        border: 1px solid rgba(255, 180, 180, 0.6);
        border-radius: 6px;
        font: 12px/1.4 system-ui, -apple-system, sans-serif;
        pointer-events: none;
        word-break: break-all;
      }
    </style>
  </head>
  <body tabindex="0">
    <img class="frozen-shot" id="frozen-shot" alt="" />
    <div class="overlay" id="overlay">
      <div class="hint">拖动鼠标选择区域 · ESC 取消</div>
      <div class="load-error" id="load-error"></div>
      <div class="selection-rect" id="selection" style="display: none;">
        <div class="size-label" id="size-label"></div>
      </div>
    </div>
    
    <script type="module">
      import { emit } from '@tauri-apps/api/event';
      import { invoke } from '@tauri-apps/api/core';
      import { getCurrentWindow } from '@tauri-apps/api/window';
      
      const overlay = document.getElementById('overlay');
      const selection = document.getElementById('selection');
      const sizeLabel = document.getElementById('size-label');
      const frozenShot = document.getElementById('frozen-shot');
      const loadError = document.getElementById('load-error');
      const currentWindow = getCurrentWindow();
      const params = new URLSearchParams(window.location.search);
      const originX = Number(params.get('originX') || '0');
      const originY = Number(params.get('originY') || '0');

      async function loadFrozenShot() {
        frozenShot.addEventListener('load', () => {
          console.log('Frozen screenshot loaded from memory');
        });
        frozenShot.addEventListener('error', () => {
          const message = '冻结截图加载失败';
          console.error(message);
          loadError.textContent = message;
          loadError.style.display = 'block';
        });

        try {
          frozenShot.src = await invoke('read_frozen_screen_data_url');
        } catch (error) {
          const message = `冻结图片加载失败: ${error}`;
          console.error(message);
          loadError.textContent = message;
          loadError.style.display = 'block';
        }
      }

      loadFrozenShot();
      
      // Ensure window is focused to receive keyboard events
      window.focus();
      document.body.focus();
      
      let isSelecting = false;
      let startX = 0;
      let startY = 0;
      let currentX = 0;
      let currentY = 0;
      
      function updateSelection() {
        const x = Math.min(startX, currentX);
        const y = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        
        selection.style.left = x + 'px';
        selection.style.top = y + 'px';
        selection.style.width = width + 'px';
        selection.style.height = height + 'px';
        sizeLabel.textContent = `${width} × ${height}`;
      }
      
      overlay.addEventListener('mousedown', (e) => {
        isSelecting = true;
        startX = e.clientX;
        startY = e.clientY;
        currentX = e.clientX;
        currentY = e.clientY;
        selection.style.display = 'block';
        updateSelection();
      });
      
      overlay.addEventListener('mousemove', (e) => {
        if (!isSelecting) return;
        currentX = e.clientX;
        currentY = e.clientY;
        updateSelection();
      });
      
      overlay.addEventListener('mouseup', async (e) => {
        if (!isSelecting) return;
        isSelecting = false;
        
        currentX = e.clientX;
        currentY = e.clientY;
        
        const x = Math.min(startX, currentX);
        const y = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        
        if (width > 10 && height > 10) {
          console.log('Region selected:', { x: x + originX, y: y + originY, width, height });
          // Emit the selection to the main window
          await emit('region-selected', { x: x + originX, y: y + originY, width, height });
        }
        
        // Close this overlay window
        await currentWindow.close();
      });
      
      // Handle ESC key to cancel
      window.addEventListener('keydown', async (e) => {
        console.log('Key pressed:', e.key);
        if (e.key === 'Escape') {
          console.log('ESC pressed, closing window');
          await emit('region-cancelled', {});
          await currentWindow.close();
        }
      });
      
      // Also listen on document level
      document.addEventListener('keydown', async (e) => {
        if (e.key === 'Escape') {
          await emit('region-cancelled', {});
          await currentWindow.close();
        }
      });
      
      // Right-click to cancel
      overlay.addEventListener('contextmenu', async (e) => {
        e.preventDefault();
        await emit('region-cancelled', {});
        await currentWindow.close();
      });
    </script>
  </body>
</html>
