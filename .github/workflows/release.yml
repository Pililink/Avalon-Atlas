name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 2.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"

jobs:
  build-windows-portable:
    name: Build Windows portable release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            Write-Error "Invalid release version: $version"
            exit 1
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "Tag: $tag"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cargo = Get-Content src-tauri/Cargo.toml -Raw

          if ($package.version -ne $version) {
            Write-Error "package.json version $($package.version) does not match release version $version"
            exit 1
          }
          if ($tauri.version -ne $version) {
            Write-Error "tauri.conf.json version $($tauri.version) does not match release version $version"
            exit 1
          }
          if ($cargo -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            Write-Error "Could not read src-tauri/Cargo.toml version"
            exit 1
          }
          if ($matches[1] -ne $version) {
            Write-Error "Cargo.toml version $($matches[1]) does not match release version $version"
            exit 1
          }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Check frontend
        run: npm run check

      - name: Build portable package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/package-portable.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Verify portable package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $packageDir = "build/portable/avalon-atlas-v$version-portable"
          $zipPath = "build/portable/avalon-atlas-v$version-portable.zip"

          $requiredPaths = @(
            "$packageDir/avalon-atlas.exe",
            "$packageDir/config.json",
            "$packageDir/static/data/maps.json",
            "$packageDir/static/maps",
            "$packageDir/static/assets",
            "$packageDir/binaries/tesseract",
            "$packageDir/binaries/tessdata/eng.traineddata",
            "$packageDir/logs",
            "$zipPath"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing release file: $path"
              exit 1
            }
          }

          $mapCount = (Get-ChildItem "$packageDir/static/maps" -Filter *.webp).Count
          if ($mapCount -lt 400) {
            Write-Error "Expected at least 400 map webp files, found $mapCount"
            exit 1
          }

          $zipSizeMb = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)
          Write-Host "Portable directory: $packageDir"
          Write-Host "Portable zip: $zipPath ($zipSizeMb MB)"
          Write-Host "Map webp files: $mapCount"

      - name: Generate release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"

          @"
          ## Avalon Atlas $tag

          Windows portable release.

          ### Download

          Download ``avalon-atlas-v$version-portable.zip``, extract it, then run ``avalon-atlas.exe``.

          ### Package Contents

          - ``avalon-atlas.exe``
          - ``config.json``
          - ``static/`` map data, map previews, and UI assets
          - ``binaries/`` bundled Tesseract runtime
          - ``logs/``
          "@ | Set-Content -Path release_notes.md -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Avalon Atlas ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
          files: |
            build/portable/avalon-atlas-v${{ steps.version.outputs.version }}-portable.zip
          fail_on_unmatched_files: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: avalon-atlas-v${{ steps.version.outputs.version }}-portable
          path: |
            build/portable/avalon-atlas-v${{ steps.version.outputs.version }}-portable/
            build/portable/avalon-atlas-v${{ steps.version.outputs.version }}-portable.zip
          retention-days: 30
