name: Bug report
description: Report a reproducible problem in Avalon Atlas.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: input
    id: version
    attributes:
      label: Avalon Atlas version
      description: "Example: v2.0.0"
      placeholder: v2.0.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that trigger the problem.
      placeholder: |
        1. Open Avalon Atlas
        2. Press Ctrl+Shift+Q
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant content from logs/avalon-atlas.log if available.
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, OCR debug images, or notes that help explain the issue.
